---
version: 5
defaults:
  datadir: data
  data_hash: yaml_data
hierarchy:
  - name: "OS + Release"
    path: "os/%{facts.os.name}-%{facts.os.release.major}.yaml"
  - name: "OS"
    path: "os/%{facts.os.name}.yaml"
  - name: "OS Family + Release"
    path: "os/%{facts.os.family}-%{facts.os.release.major}.yaml"
  - name: "OS Family"
    path: "os/%{facts.os.family}.yaml"
  - name: "Common"
    path: "common.yaml"
